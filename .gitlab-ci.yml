stages:
  - "🏗️build"
  - "📦push"
  - "🚀deploy"

include:
  - project: 'IUT_INF63/generic-ci'
    ref: 'main'
    file:
      - 'build/.docker-build.yml'
      - 'deploy/.docker-deploy.yml'

# --- 1. BUILD (Node.js pour Vue) ---
build:
  stage: "🏗️build"
  image: node:20-alpine
  script:
    - npm ci                  # Installation propre des dépendances
    - npm run build           # Compilation de Vue (crée le dossier dist/)
  artifacts:
    expire_in: 1 week
    paths:
      - dist/                 # ⚠️ IMPORTANT : On garde le dossier compilé pour l'étape d'après
  rules:
    - when: always

# --- 2. PUSH (Création image Nginx) ---
push-front-image:
  extends: .build-and-push-docker-image
  stage: "📦push"
  variables:
    DOCKERFILE_RELATIVE_PATH: Dockerfile
    DOCKERFILE_CONTEXT_PATH: .
    DESTINATION_REGISTRY_IMAGE_NAME: $CI_REGISTRY_IMAGE
  needs:
    - job: build
      artifacts: true
  rules:
    - when: always
  before_script:
    # Génération du tag unique (comme pour l'API)
    - BASE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - if [ -z "$BASE_TAG" ]; then BASE_TAG="build-$CI_PIPELINE_ID"; fi
    - VERSION="${BASE_TAG}-front"
    - export DESTINATION_REGISTRY_IMAGE_VERSION="$VERSION"

# --- 3. DEPLOY (Nginx) ---
deploy-front:
  extends: .deploy-image
  stage: "🚀deploy"
  variables:
    CONTAINER_NAME: portfolio
    # (L'image est gérée par le before_script)

    # ✅ CONFIG RESEAU
    # Nginx écoute sur le port 80 par défaut
    CONTAINER_HTTP_PORT: 80
    
    CONTAINER_RAM: "64M"
    CONTAINER_CPU: "0.2"

    # ✅ AUTHENTIFICATION
    NAMESPACE_TOKEN: $KUBE_TOKEN
    NAMESPACE_NAME: torandrian
    IS_PUBLIC: true

  needs: ["push-front-image"]
  before_script:
    - BASE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - if [ -z "$BASE_TAG" ]; then BASE_TAG="build-$CI_PIPELINE_ID"; fi
    - export CONTAINER_IMAGE_PATH="${CI_REGISTRY_IMAGE}:${BASE_TAG}-front"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success